<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#06C755"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Family Chat"/>
<title>Family Chat</title>
<link rel="manifest" href="#" id="manifest-link"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#06C755;--green-dark:#05A847;
  --bg:#F0F0F0;--white:#fff;--black:#111;
  --gray:#8A8A8A;--gray-light:#E5E5E5;--gray-mid:#C8C8C8;
  --bubble-me:#C8F7B4;--bubble-them:#fff;
  --danger:#FF3B30;--radius:18px;
  --font:'Noto Sans Thai',sans-serif;
}
body.dark{
  --bg:#1a1a1a;--white:#2a2a2a;--black:#f0f0f0;
  --gray:#aaa;--gray-light:#333;--gray-mid:#555;
  --bubble-me:#1a472a;--bubble-them:#2a2a2a;
}
body{font-family:var(--font);background:var(--bg);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
input,button,textarea{font-family:var(--font)}
.screen{display:none;flex-direction:column;height:100dvh;position:absolute;inset:0;background:var(--bg)}
.screen.active{display:flex}

/* LOGIN */
#loginScreen{background:var(--green);align-items:center;justify-content:center;gap:24px}
.login-logo{width:80px;height:80px;background:#fff;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.login-title{color:#fff;font-size:28px;font-weight:700}
.login-sub{color:rgba(255,255,255,.8);font-size:14px}
.login-box{background:#fff;border-radius:16px;padding:24px;width:calc(100% - 48px);max-width:360px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.login-box input{border:1.5px solid var(--gray-mid);border-radius:10px;padding:13px 16px;font-size:15px;outline:none;transition:.2s}
.login-box input:focus{border-color:var(--green)}
.btn-login{background:var(--green);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer}
.btn-login:active{background:var(--green-dark)}
.login-err{color:var(--danger);font-size:13px;text-align:center;min-height:18px}

/* TABS */
.tab-bar{display:flex;background:#fff;border-top:1px solid var(--gray-light);position:absolute;bottom:0;left:0;right:0;z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 10px;gap:3px;border:none;background:none;cursor:pointer;color:var(--gray);font-size:10px}
.tab-btn.active{color:var(--green)}
.tab-btn svg{width:24px;height:24px}
.tab-content{flex:1;overflow:hidden;position:relative;margin-bottom:56px}
.tab-pane{display:none;flex-direction:column;height:100%;position:absolute;inset:0}
.tab-pane.active{display:flex}

/* HEADER */
.top-bar{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;min-height:56px;flex-shrink:0}
.top-bar h2{font-size:18px;font-weight:700;flex:1}

/* CHAT LIST */
.chat-list{overflow-y:auto;flex:1}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid var(--gray-light);cursor:pointer}
.chat-item:active{background:#f5f5f5}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:15px;font-weight:600;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-preview{font-size:13px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.chat-time{font-size:11px;color:var(--gray)}

/* CHAT ROOM */
#chatRoomScreen{z-index:10}
.chat-room-bar{background:var(--green);color:#fff;padding:10px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.room-info{flex:1}
.room-info .name{font-size:15px;font-weight:700}
.room-info .status{font-size:11px;opacity:.85}
.room-actions{display:flex;gap:2px}
.room-act-btn{background:none;border:none;color:#fff;padding:8px;cursor:pointer;border-radius:50%}
.room-act-btn:active{background:rgba(255,255,255,.2)}
.room-act-btn svg{width:22px;height:22px;display:block}

.messages-area{flex:1;overflow-y:auto;padding:12px 12px 8px;display:flex;flex-direction:column;gap:6px}
.msg-row{display:flex;align-items:flex-end;gap:6px}
.msg-row.me{flex-direction:row-reverse}
.avatar-sm{width:28px;height:28px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.avatar-sm img{width:100%;height:100%;object-fit:cover}
.bubble{max-width:75%;padding:10px 14px;border-radius:var(--radius);font-size:15px;line-height:1.6;word-break:break-word;white-space:pre-wrap;position:relative}
.msg-row.them .bubble{background:var(--bubble-them);border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.msg-row.me .bubble{background:var(--bubble-me);border-bottom-right-radius:4px}
.bubble img{max-width:100%;border-radius:10px;display:block;cursor:pointer;white-space:normal}
.msg-time{font-size:10px;color:var(--gray);flex-shrink:0;margin-bottom:2px}
.msg-sender{font-size:11px;color:var(--gray);margin-bottom:2px}
.date-divider{text-align:center;color:var(--gray);font-size:12px;margin:8px 0;position:relative}
.date-divider span{background:var(--bg);padding:0 10px;position:relative;z-index:1}
.date-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--gray-mid)}

.input-area{background:#fff;padding:8px 10px;display:flex;align-items:flex-end;gap:8px;border-top:1px solid var(--gray-light);flex-shrink:0}
.input-area textarea{flex:1;border:none;outline:none;font-size:15px;resize:none;max-height:100px;line-height:1.4;padding:6px 2px;background:transparent}
.inp-btn{background:none;border:none;color:var(--gray);cursor:pointer;padding:6px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.inp-btn svg{width:24px;height:24px}
.send-btn{background:var(--green);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send-btn:active{background:var(--green-dark)}
.send-btn svg{width:18px;height:18px;fill:#fff}

/* PROFILE */
.profile-area{overflow-y:auto;flex:1;padding:16px}
.profile-card{background:#fff;border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.profile-avatar-wrap{position:relative;width:90px;height:90px}
.profile-avatar-wrap .avatar{width:90px;height:90px;font-size:40px}
.edit-avatar-btn{position:absolute;bottom:0;right:0;background:var(--green);border:none;border-radius:50%;width:28px;height:28px;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.profile-name{font-size:20px;font-weight:700}
.profile-email{font-size:13px;color:var(--gray)}
.setting-group{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.setting-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--gray-light);cursor:pointer}
.setting-item:last-child{border-bottom:none}
.setting-item:active{background:#f5f5f5}
.setting-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.setting-label{flex:1;font-size:15px}
.setting-arrow{color:var(--gray-mid);font-size:18px}
.btn-logout{background:var(--danger);color:#fff;border:none;border-radius:12px;padding:14px;width:100%;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}

/* MEMBERS */
.member-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#fff;border-bottom:1px solid var(--gray-light)}
.online-dot{width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid #fff;position:absolute;bottom:0;right:0}
.avatar-wrap{position:relative;flex-shrink:0}

/* CALL OVERLAY */
#callOverlay{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);z-index:999;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 20px 50px}
#callOverlay.active{display:flex}
.call-avatar-big{width:100px;height:100px;border-radius:50%;font-size:48px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:8px}
.call-avatar-big img{width:100%;height:100%;object-fit:cover}
.call-name{font-size:26px;font-weight:700;color:#fff}
.call-status{font-size:15px;color:rgba(255,255,255,.7);margin-top:6px}
.call-actions{display:flex;gap:28px;align-items:center}
.call-btn{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:none;border:none;color:#fff;font-size:12px}
.call-btn .icon{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}
.call-btn.end .icon{background:var(--danger)}
.call-btn.mute .icon,.call-btn.speaker .icon,.call-btn.cam .icon{background:rgba(255,255,255,.2)}
.call-btn.active-state .icon{background:rgba(255,255,255,.4)}

/* VIDEO */
#videoContainer{display:none;position:fixed;inset:0;background:#000;z-index:998;flex-direction:column}
#videoContainer.active{display:flex}
#remoteVideo{flex:1;width:100%;object-fit:cover;background:#111}
#localVideo{position:absolute;top:16px;right:16px;width:100px;height:140px;border-radius:12px;object-fit:cover;background:#222;border:2px solid rgba(255,255,255,.3)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:990;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-input{border:1.5px solid var(--gray-mid);border-radius:10px;padding:12px 14px;font-size:15px;width:100%;outline:none;margin-bottom:12px}
.modal-input:focus{border-color:var(--green)}
.modal-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px}
.modal-btn-cancel{background:var(--gray-light);color:var(--black);border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;cursor:pointer}

/* MISC */
#imgViewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:997;align-items:center;justify-content:center}
#imgViewer.active{display:flex}
#imgViewer img{max-width:100%;max-height:100%;object-fit:contain}
.close-viewer{position:absolute;top:16px;right:16px;color:#fff;font-size:30px;cursor:pointer;background:none;border:none}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:.3s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spinner{width:36px;height:36px;border:3px solid var(--gray-light);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{flex:1;display:flex;align-items:center;justify-content:center}
::-webkit-scrollbar{width:0}
/* Typing indicator */
.typing-bubble{display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--bubble-them);border-radius:var(--radius);border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--gray);animation:typingAnim 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingAnim{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
/* Read receipt */
.read-tick{font-size:10px;color:var(--green);margin-left:3px}
/* Swipe reply */
.bubble-wrap{position:relative}
/* Status badge */
.status-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;margin-top:4px}
/* Album grid */
.album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.album-item{aspect-ratio:1;overflow:hidden;cursor:pointer;border-radius:4px;background:var(--gray-light)}
.album-item img{width:100%;height:100%;object-fit:cover}
/* Group chat */
.group-msg-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;border-radius:8px;cursor:pointer;position:relative}
.cal-day.today{background:var(--green);color:#fff;font-weight:700}
.cal-day.has-event::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--danger);position:absolute;bottom:3px}
.cal-day.other-month{color:var(--gray-mid)}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-header span{text-align:center;font-size:11px;color:var(--gray);font-weight:600}
.event-item{background:var(--white);border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;gap:12px;align-items:center}
.event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="login-logo">💬</div>
  <div class="login-title">Family Chat</div>
  <div class="login-sub">ห้องแชทครอบครัว</div>
  <div class="login-box">
    <input type="email" id="loginEmail" placeholder="อีเมล" autocomplete="email"/>
    <input type="password" id="loginPass" placeholder="รหัสผ่าน" autocomplete="current-password"/>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" id="loginBtn">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="mainScreen">
  <div class="tab-content">
    <!-- CHATS -->
    <div class="tab-pane active" id="tabChats">
      <div class="top-bar" style="justify-content:space-between">
        <h2>💬 แชท</h2>
        <button onclick="openGroupRoom()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer">กลุ่ม 👨‍👩‍👧‍👦</button>
      </div>
      <div class="chat-list" id="chatList"><div class="loading-center"><div class="spinner"></div></div></div>
    </div>
    <!-- MEMBERS -->
    <div class="tab-pane" id="tabMembers">
      <div class="top-bar"><h2>👨‍👩‍👧‍👦 สมาชิก</h2></div>
      <div style="overflow-y:auto;flex:1" id="memberList"><div class="loading-center"><div class="spinner"></div></div></div>
    </div>
    <!-- GROUP -->
    <div class="tab-pane" id="tabGroup">
      <div class="top-bar" style="justify-content:space-between">
        <h2>👨‍👩‍👧‍👦 แชทกลุ่ม</h2>
      </div>
      <div style="overflow-y:auto;flex:1" id="groupArea">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ALBUM -->
    <div class="tab-pane" id="tabAlbum">
      <div class="top-bar"><h2>📸 อัลบั้มครอบครัว</h2></div>
      <div style="overflow-y:auto;flex:1;padding:12px" id="albumArea">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="tab-pane" id="tabProfile">
      <div class="top-bar"><h2>⚙️ โปรไฟล์</h2></div>
      <div class="profile-area" id="profileArea"></div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tabChats',this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>แชท
    </button>
    <button class="tab-btn" onclick="switchTab('tabMembers',this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>สมาชิก
    </button>
    <button class="tab-btn" onclick="switchTab('tabGroup',this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>กลุ่ม
    </button>
    <button class="tab-btn" onclick="switchTab('tabAlbum',this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>อัลบั้ม
    </button>
    <button class="tab-btn" onclick="switchTab('tabProfile',this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>โปรไฟล์
    </button>
  </div>
</div>

<!-- CHAT ROOM -->
<div class="screen" id="chatRoomScreen" style="z-index:10">
  <div class="chat-room-bar">
    <button style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px" onclick="closeRoom()">‹</button>
    <div class="avatar-wrap">
      <div class="avatar" id="roomAvatar" style="width:38px;height:38px;font-size:18px"></div>
    </div>
    <div class="room-info"><div class="name" id="roomName"></div><div class="status" id="roomStatus"></div></div>
    <div class="room-actions">
      <button class="room-act-btn" onclick="startCall(false)" title="โทรเสียง">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </button>
      <button class="room-act-btn" onclick="startCall(true)" title="วีดีโอคอล">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      </button>
    </div>
  </div>
  <div class="messages-area" id="messagesArea"></div>
  <div class="input-area">
    <button class="inp-btn" onclick="pickImage()">

// Ringtone using Web Audio API
let audioCtx = null;
let ringInterval = null;

function playTone(freq, duration, volume=0.4){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'sine';
  const t = audioCtx.currentTime;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(volume, t+0.02);
  gain.gain.setValueAtTime(volume, t+duration-0.02);
  gain.gain.linearRampToValueAtTime(0, t+duration);
  osc.start(t); osc.stop(t+duration);
}

function playConnectedSound(){
  // เสียงตูดยาว = โทรติด
  try {
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    playTone(480, 0.8, 0.4);
    stopRingtone();
  } catch(e){}
}

function playBusySound(){
  // เสียงบีบสั้นๆ = ไม่ติด
  stopRingtone();
  try {
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    let count = 0;
    const beep = () => {
      if(!audioCtx) return;
      playTone(620, 0.15, 0.3);
      count++;
      if(count < 4) setTimeout(beep, 300);
    };
    beep();
  } catch(e){}
}

function playRingtone(outgoing=false){
  stopRingtone();
  try {
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(outgoing){
      // เสียงรอสาย — ตูดยาวทุก 3 วิ
      const ring = () => { playTone(440, 1.0, 0.35); setTimeout(()=>playTone(480, 1.0, 0.35), 0); };
      ring();
      ringInterval = setInterval(ring, 3000);
    } else {
      // เสียงเรียกเข้า — สองเสียงสลับ
      const ring = () => {
        playTone(880, 0.2, 0.4);
        setTimeout(()=>playTone(660, 0.2, 0.4), 250);
        setTimeout(()=>playTone(880, 0.2, 0.4), 500);
      };
      ring();
      ringInterval = setInterval(ring, 2000);
    }
  } catch(e){}
}

function stopRingtone(){
  if(ringInterval){ clearInterval(ringInterval); ringInterval=null; }
  if(audioCtx){ try{audioCtx.close();}catch(e){} audioCtx=null; }
}

function listenMessages(){

      let lastDate='';

        const d = doc.data();
        if(!d.createdAt) return;
        const date = d.createdAt.toDate().toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});

          doc.ref.update({readBy:firebase.firestore.FieldValue.arrayUnion(currentUser.email)});
        }
      });
      if(wasAtBottom) area.scrollTop=area.scrollHeight;
    });

  // Listen typing
  db.collection('rooms').doc(currentRoomId).collection('typing')
    .onSnapshot(snap=>{

function renderMsg(area,d,docId=""){
  const me = d.senderEmail===currentUser.email;
  const m = getMember(d.senderEmail);

    sysDiv.textContent = d.text||'';
    const wrap = document.createElement('div');
    wrap.style.cssText='display:flex;justify-content:center;width:100%';
    wrap.appendChild(sysDiv);
    area.appendChild(wrap);
    return;
  }
  let bubble='';
  if(d.type==='image') bubble=`<img src="${d.imageUrl}" onclick="openViewer('${d.imageUrl}')" loading="lazy"/>`;
  else bubble=escHtml(d.text||'');
  const time = d.createdAt?fmtTime(d.createdAt.toDate()):'';
  const readBy = d.readBy||[];
  const isRead = me && readBy.some(e=>e!==currentUser.email);
  row.innerHTML=`
    ${!me?`<div class="avatar-sm" style="background:${m.color}20">${m.photoURL?`<img src="${m.photoURL}"/>`:(m.emoji)}</div>`:''}
    <div style="display:flex;flex-direction:column;align-items:${me?'flex-end':'flex-start'};gap:2px;flex:1;min-width:0">
      ${!me?`<div class="msg-sender">${m.name}</div>`:''}
      <div class="bubble" data-id="${docId||''}" data-me="${me}">${bubble}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">
      <div class="msg-time">${time}</div>
      ${me?`<div class="read-tick">${isRead?'✓✓':''}</div>`:''}
    </div>`;

  // Long press to delete
  if(me && docId){
    const bubbleEl = row.querySelector('.bubble');
    let pressTimer;
    bubbleEl.addEventListener('touchstart',()=>{
      pressTimer=setTimeout(()=>{
        if(confirm('ลบข้อความนี้?')){
          db.collection('rooms').doc(currentRoomId).collection('messages').doc(docId).delete();
        }
      },600);
    });
    bubbleEl.addEventListener('touchend',()=>clearTimeout(pressTimer));
    bubbleEl.addEventListener('touchmove',()=>clearTimeout(pressTimer));
  }
  area.appendChild(row);
}

  try{

    });

// ===== WebRTC CALL =====
function createPeer(){
  const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});
  pc.ontrack=e=>{
    if(isVideoCall){
      document.getElementById('remoteVideo').srcObject=e.streams[0];
    } else {
      remoteAudio.srcObject=e.streams[0]; remoteAudio.play();
    }
  };
  pc.onicecandidate=async e=>{
    if(!e.candidate) return;
    const ref=db.collection('calls').doc(currentRoomId);
    const snap=await ref.get();
    const d=snap.data()||{};
    const isCaller=d.caller===currentUser.email;
    const field=isCaller?'callerCandidates':'calleeCandidates';
    const arr=d[field]||[];
    arr.push(e.candidate.toJSON());
    await ref.update({[field]:arr});
  };
  return pc;
}

async function startCall(video=false){
  if(!chatPartner) return;
  isVideoCall=video;
  const m=getMember(chatPartner);
  showCallUI(m,video,'กำลังโทร...');

  try{
    playRingtone(true);
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:video});
    if(video) document.getElementById('localVideo').srcObject=localStream;
    peerConn=createPeer();
    localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));
    const offer=await peerConn.createOffer();
    await peerConn.setLocalDescription(offer);
    await db.collection('calls').doc(currentRoomId).set({
      caller:currentUser.email, callee:chatPartner,
      offer:{type:offer.type,sdp:offer.sdp},
      status:'calling', isVideo:video,
      channel:currentRoomId,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    db.collection('calls').doc(currentRoomId).onSnapshot(async snap=>{
      const d=snap.data();
      if(!d) return;
      if(d.answer&&peerConn&&!peerConn.currentRemoteDescription){
        await peerConn.setRemoteDescription(new RTCSessionDescription(d.answer));
        playConnectedSound();
        updateCallStatus('เชื่อมต่อแล้ว'); startCallTimer();
      }
      if(d.calleeCandidates){
        for(const c of d.calleeCandidates){ try{await peerConn.addIceCandidate(new RTCIceCandidate(c));}catch(e){} }
      }
      if(d.status==='declined'){ playBusySound(); setTimeout(endCall,1200); }
      else if(d.status==='ended') endCall();
    });
  }catch(e){ showToast('โทรไม่ได้: '+e.message); hideCallUI(); }
}

function showCallUI(m,video,status){
  if(video){
    document.getElementById('videoContainer').classList.add('active');
    document.getElementById('videoCallName').textContent=m.name;
    document.getElementById('videoCallStatus').textContent=status;
  } else {
    document.getElementById('callOverlay').classList.add('active');
    const av=document.getElementById('callAvatarEl');
    if(m.photoURL) av.innerHTML=`<img src="${m.photoURL}" style="width:100%;height:100%;object-fit:cover"/>`;
    else av.textContent=m.emoji;
    document.getElementById('callName').textContent=m.name;
    document.getElementById('callStatus').textContent=status;
  }
}

function updateCallStatus(s){
  if(isVideoCall) document.getElementById('videoCallStatus').textContent=s;
  else document.getElementById('callStatus').textContent=s;
}

function hideCallUI(){
  document.getElementById('callOverlay').classList.remove('active');
  document.getElementById('videoContainer').classList.remove('active');
}

async function endCall(){
  stopRingtone();
  clearInterval(callTimer);
  const wasConnected = callSeconds > 0;
  callSeconds=0;
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if(peerConn){ peerConn.close(); peerConn=null; }
  remoteAudio.srcObject=null;
  const rv=document.getElementById('remoteVideo');
  const lv=document.getElementById('localVideo');
  if(rv) rv.srcObject=null;
  if(lv) lv.srcObject=null;
  hideCallUI();
  if(currentRoomId){
    try{
      const snap = await db.collection('calls').doc(currentRoomId).get();
      const d = snap.data();
      if(d && d.status==='calling'){
        // ยังไม่ได้รับสาย = สายไม่ได้รับ
        await snap.ref.update({status:'missed'});
        // บันทึก missed call ใน messages
        await db.collection('rooms').doc(currentRoomId).collection('messages').add({
          text:'📵 สายไม่ได้รับ',
          senderEmail: currentUser.email,
          type:'system',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      } else {
        await snap.ref.update({status:'ended'});
        if(!wasConnected){
          await db.collection('rooms').doc(currentRoomId).collection('messages').add({
            text:'📞 วางสายแล้ว',
            senderEmail: currentUser.email,
            type:'system',
            createdAt:firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      }
    }catch(e){}
  }
}

let pendingCallData = null;

function listenIncomingCalls(){
  if(!currentUser) return;
  db.collection('calls').where('callee','==',currentUser.email).where('status','==','calling')
    .onSnapshot(snap=>{
      snap.docChanges().forEach(change=>{
        if(change.type==='added'){
          const d=change.doc.data();
          pendingCallData = {...d, docRef: change.doc.ref};
          currentRoomId = d.channel;
          const caller = getMember(d.caller);
          const ic = document.getElementById('incomingCall');
          const av = document.getElementById('incomingAvatar');
          if(caller.photoURL) av.innerHTML=`<img src="${caller.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
          else av.textContent = caller.emoji;
          document.getElementById('incomingName').textContent = caller.name;
          document.getElementById('incomingType').textContent = d.isVideo ? '📹 วีดีโอคอล' : '📞 โทรศัพท์';
          ic.style.display = 'flex';
          playRingtone(false);
        }
        if(change.type==='removed' || (change.type==='modified' && change.doc.data().status==='ended')){
          hideIncomingCall();
        }
      });
    });
}

function hideIncomingCall(){
  document.getElementById('incomingCall').style.display='none';
  stopRingtone();
  pendingCallData=null;
}

async function declineCall(){
  if(pendingCallData?.docRef){
    await pendingCallData.docRef.update({status:'declined'});
    // แจ้งในแชทว่าปฏิเสธสาย

async function answerCall(d){
  isVideoCall=d.isVideo||false;
  const m=getMember(d.caller);

    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVideoCall});

    peerConn=createPeer();
    localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));
    await peerConn.setRemoteDescription(new RTCSessionDescription(d.offer));
    const answer=await peerConn.createAnswer();
    await peerConn.setLocalDescription(answer);
    await db.collection('calls').doc(d.channel).update({
      answer:{type:answer.type,sdp:answer.sdp}, status:'active'
    });
    if(d.callerCandidates){
      for(const c of d.callerCandidates){ try{await peerConn.addIceCandidate(new RTCIceCandidate(c));}catch(e){} }

      div.className='album-item';
      div.innerHTML=`<img src="${d.url}" loading="lazy"/>`;
      div.onclick=()=>openViewer(d.url);
      grid.appendChild(div);
    });
  });
}

// ===== CALENDAR =====
let currentCalDate = new Date();
let calEvents = [];

function loadCalendar(){
  const area=document.getElementById('groupArea');
  area.innerHTML=`
    <div style="padding:16px">
      <div style="background:var(--white);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <button onclick="prevMonth()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--black)">‹</button>
          <div style="font-size:16px;font-weight:700;color:var(--black)" id="calMonthLabel"></div>
          <button onclick="nextMonth()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--black)">›</button>
        </div>
        <div class="cal-header">
          <span>อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span>ส</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:15px;font-weight:700;color:var(--black)">นัดหมาย</div>
        <button onclick="openAddEvent()" style="background:var(--green);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer">+ เพิ่ม</button>
      </div>
      <div id="eventList"></div>
    </div>`;
  db.collection('events').orderBy('date','asc').onSnapshot(snap=>{
    calEvents=[];
    snap.forEach(doc=>calEvents.push({id:doc.id,...doc.data()}));
    renderCalendar();
    renderEvents();
  });
}

function renderCalendar(){
  const label=document.getElementById('calMonthLabel');
  const grid=document.getElementById('calGrid');
  if(!label||!grid) return;
  label.textContent=currentCalDate.toLocaleDateString('th-TH',{month:'long',year:'numeric'});
  const year=currentCalDate.getFullYear();
  const month=currentCalDate.getMonth();
  const first=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  const today=new Date();
  grid.innerHTML='';
  for(let i=0;i<first;i++){
    const d=document.createElement('div');
    d.className='cal-day other-month';
    grid.appendChild(d);
  }
  for(let d=1;d<=days;d++){
    const div=document.createElement('div');
    div.className='cal-day';
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear()) div.classList.add('today');
    if(calEvents.some(e=>e.date===dateStr)) div.classList.add('has-event');
    div.textContent=d;
    div.onclick=()=>scrollToDate(dateStr);
    grid.appendChild(div);
  }
}

function renderEvents(){
  const list=document.getElementById('eventList');
  if(!list) return;
  if(calEvents.length===0){ list.innerHTML='<div style="text-align:center;color:var(--gray);padding:20px">ยังไม่มีนัดหมาย</div>'; return; }
  list.innerHTML='';
  calEvents.forEach(ev=>{
    const div=document.createElement('div');
    div.className='event-item';
    div.id='ev_'+ev.date;
    div.innerHTML=`
      <div class="event-dot" style="background:var(--green)"></div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:600;color:var(--black)">${ev.title}</div>
        <div style="font-size:12px;color:var(--gray)">${ev.date}${ev.time?' '+ev.time:''}</div>
        ${ev.note?`<div style="font-size:13px;color:var(--gray);margin-top:2px">${ev.note}</div>`:''}
      </div>
      <button onclick="deleteEvent('${ev.id}')" style="background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer">🗑</button>`;
    list.appendChild(div);
  });
}

function scrollToDate(date){
  const el=document.getElementById('ev_'+date);
  if(el) el.scrollIntoView({behavior:'smooth'});
}

function prevMonth(){ currentCalDate.setMonth(currentCalDate.getMonth()-1); renderCalendar(); }
function nextMonth(){ currentCalDate.setMonth(currentCalDate.getMonth()+1); renderCalendar(); }

function openAddEvent(){
  document.getElementById('eventDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('addEventModal').classList.add('active');
}

async function saveEvent(){
  const title=document.getElementById('eventTitle').value.trim();
  const date=document.getElementById('eventDate').value;
  const time=document.getElementById('eventTime').value;
  const note=document.getElementById('eventNote').value.trim();
  if(!title||!date){ showToast('กรุณากรอกชื่อและวันที่'); return; }
  await db.collection('events').add({
    title, date, time, note,
    createdBy:currentUser.email,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  closeModal('addEventModal');
  showToast('เพิ่มนัดหมายแล้ว ✓');
  ['eventTitle','eventTime','eventNote'].forEach(id=>document.getElementById(id).value='');
}

async function deleteEvent(id){
  if(confirm('ลบนัดหมายนี้?')){
    await db.collection('events').doc(id).delete();
    showToast('ลบแล้ว');
  }
}
