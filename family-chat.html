<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#06C755"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Family Chat"/>
<title>Family Chat</title>
<link rel="manifest" href="#" id="manifest-link"/>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<!-- Agora -->
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#06C755;--green-dark:#05A847;--green-light:#E8F9EE;
  --bg:#F0F0F0;--white:#fff;--black:#111;
  --gray:#8A8A8A;--gray-light:#E5E5E5;--gray-mid:#C8C8C8;
  --bubble-me:#C8F7B4;--bubble-them:#fff;
  --header:#06C755;--header-text:#fff;
  --danger:#FF3B30;--blue:#007AFF;
  --radius:18px;--radius-sm:10px;
  --font:'Noto Sans Thai',sans-serif;
}
body{font-family:var(--font);background:var(--bg);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
input,button,textarea{font-family:var(--font)}

/* ===== SCREENS ===== */
.screen{display:none;flex-direction:column;height:100dvh;position:absolute;inset:0;background:var(--bg)}
.screen.active{display:flex}

/* ===== LOGIN ===== */
#loginScreen{background:var(--green);align-items:center;justify-content:center;gap:24px}
.login-logo{width:80px;height:80px;background:var(--white);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.login-title{color:#fff;font-size:28px;font-weight:700;letter-spacing:.5px}
.login-sub{color:rgba(255,255,255,.8);font-size:14px}
.login-box{background:var(--white);border-radius:16px;padding:24px;width:calc(100% - 48px);max-width:360px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.login-box input{border:1.5px solid var(--gray-mid);border-radius:10px;padding:13px 16px;font-size:15px;outline:none;transition:.2s}
.login-box input:focus{border-color:var(--green)}
.btn-login{background:var(--green);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;transition:.15s}
.btn-login:active{background:var(--green-dark)}
.login-err{color:var(--danger);font-size:13px;text-align:center;min-height:18px}

/* ===== TABS ===== */
#mainScreen{background:var(--bg)}
.tab-bar{display:flex;background:var(--white);border-top:1px solid var(--gray-light);position:absolute;bottom:0;left:0;right:0;z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 10px;gap:3px;border:none;background:none;cursor:pointer;color:var(--gray);font-size:10px;transition:.15s}
.tab-btn.active{color:var(--green)}
.tab-btn svg{width:24px;height:24px}
.tab-content{flex:1;overflow:hidden;position:relative;margin-bottom:56px}
.tab-pane{display:none;flex-direction:column;height:100%;position:absolute;inset:0}
.tab-pane.active{display:flex}

/* ===== HEADER ===== */
.top-bar{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;min-height:56px;flex-shrink:0}
.top-bar h2{font-size:18px;font-weight:700;flex:1}
.top-bar-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1}
.top-bar-action{background:none;border:none;color:#fff;cursor:pointer;padding:4px}

/* ===== CHAT LIST ===== */
.chat-list{overflow-y:auto;flex:1}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--gray-light);cursor:pointer;transition:.1s}
.chat-item:active{background:#f5f5f5}
.avatar{width:48px;height:48px;border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:15px;font-weight:600;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-preview{font-size:13px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.chat-time{font-size:11px;color:var(--gray)}
.badge{background:var(--green);color:#fff;border-radius:10px;font-size:11px;font-weight:700;padding:1px 7px;min-width:20px;text-align:center}

/* ===== CHAT ROOM ===== */
#chatRoomScreen{z-index:10}
.chat-room-bar{background:var(--green);color:#fff;padding:10px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-room-bar .avatar{width:38px;height:38px;font-size:18px}
.chat-room-bar .info{flex:1}
.chat-room-bar .info .name{font-size:15px;font-weight:700}
.chat-room-bar .info .status{font-size:11px;opacity:.85}
.room-actions{display:flex;gap:4px}
.room-act-btn{background:none;border:none;color:#fff;padding:8px;cursor:pointer;border-radius:50%;transition:.15s}
.room-act-btn:active{background:rgba(255,255,255,.2)}
.room-act-btn svg{width:22px;height:22px}

.messages-area{flex:1;overflow-y:auto;padding:12px 12px 8px;display:flex;flex-direction:column;gap:6px}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.me{flex-direction:row-reverse}
.msg-row .avatar-sm{width:28px;height:28px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bubble{max-width:70%;padding:9px 13px;border-radius:var(--radius);font-size:14.5px;line-height:1.45;word-break:break-word;position:relative}
.msg-row.them .bubble{background:var(--bubble-them);border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.msg-row.me .bubble{background:var(--bubble-me);border-bottom-right-radius:4px}
.bubble img{max-width:100%;border-radius:10px;display:block;cursor:pointer}
.msg-time{font-size:10px;color:var(--gray);flex-shrink:0;margin-bottom:2px}
.msg-sender{font-size:11px;color:var(--gray);margin-bottom:2px}
.date-divider{text-align:center;color:var(--gray);font-size:12px;margin:8px 0;position:relative}
.date-divider span{background:var(--bg);padding:0 10px;position:relative;z-index:1}
.date-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--gray-mid)}

.input-area{background:var(--white);padding:8px 10px;display:flex;align-items:flex-end;gap:8px;border-top:1px solid var(--gray-light);flex-shrink:0}
.input-area textarea{flex:1;border:none;outline:none;font-size:15px;resize:none;max-height:100px;line-height:1.4;padding:6px 2px;background:transparent}
.inp-btn{background:none;border:none;color:var(--gray);cursor:pointer;padding:6px;border-radius:50%;transition:.15s;display:flex;align-items:center;justify-content:center}
.inp-btn:active{background:var(--gray-light)}
.inp-btn svg{width:24px;height:24px}
.send-btn{background:var(--green);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.15s}
.send-btn:active{background:var(--green-dark)}
.send-btn svg{width:18px;height:18px;fill:#fff}

/* ===== PROFILE TAB ===== */
.profile-area{overflow-y:auto;flex:1;padding:16px}
.profile-card{background:var(--white);border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.profile-avatar{width:80px;height:80px;border-radius:50%;font-size:36px;display:flex;align-items:center;justify-content:center}
.profile-name{font-size:20px;font-weight:700}
.profile-email{font-size:13px;color:var(--gray)}
.setting-group{background:var(--white);border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.setting-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--gray-light);cursor:pointer;transition:.1s}
.setting-item:last-child{border-bottom:none}
.setting-item:active{background:#f5f5f5}
.setting-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.setting-label{flex:1;font-size:15px}
.setting-arrow{color:var(--gray-mid);font-size:18px}
.btn-logout{background:var(--danger);color:#fff;border:none;border-radius:12px;padding:14px;width:100%;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}

/* ===== CALL OVERLAY ===== */
#callOverlay{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);z-index:999;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 20px 50px}
#callOverlay.active{display:flex}
.call-avatar{width:100px;height:100px;border-radius:50%;font-size:48px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.call-name{font-size:26px;font-weight:700;color:#fff}
.call-status{font-size:15px;color:rgba(255,255,255,.7);margin-top:6px}
.call-actions{display:flex;gap:32px;align-items:center}
.call-btn{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:none;border:none;color:#fff;font-size:12px}
.call-btn .icon{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px}
.call-btn.end .icon{background:var(--danger)}
.call-btn.mute .icon{background:rgba(255,255,255,.2)}
.call-btn.speaker .icon{background:rgba(255,255,255,.2)}
.call-btn.active-btn .icon{background:rgba(255,255,255,.35)}
#remoteVideo,#localVideo{display:none}

/* ===== IMAGE VIEWER ===== */
#imgViewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:998;align-items:center;justify-content:center}
#imgViewer.active{display:flex}
#imgViewer img{max-width:100%;max-height:100%;object-fit:contain}
#imgViewer .close-viewer{position:absolute;top:16px;right:16px;color:#fff;font-size:30px;cursor:pointer;background:none;border:none;line-height:1}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:.3s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== LOADING ===== */
.spinner{width:36px;height:36px;border:3px solid var(--gray-light);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{flex:1;display:flex;align-items:center;justify-content:center}

/* ===== MEMBERS TAB ===== */
.member-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--white);border-bottom:1px solid var(--gray-light)}
.online-dot{width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid #fff;position:absolute;bottom:0;right:0}
.avatar-wrap{position:relative}

/* scrollbar */
::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="login-logo">💬</div>
  <div class="login-title">Family Chat</div>
  <div class="login-sub">ห้องแชทครอบครัว</div>
  <div class="login-box">
    <input type="email" id="loginEmail" placeholder="อีเมล" autocomplete="email"/>
    <input type="password" id="loginPass" placeholder="รหัสผ่าน" autocomplete="current-password"/>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" id="loginBtn">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="mainScreen">
  <!-- TAB CONTENT -->
  <div class="tab-content">

    <!-- CHATS TAB -->
    <div class="tab-pane active" id="tabChats">
      <div class="top-bar"><h2>💬 แชท</h2></div>
      <div class="chat-list" id="chatList">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- MEMBERS TAB -->
    <div class="tab-pane" id="tabMembers">
      <div class="top-bar"><h2>👨‍👩‍👧‍👦 สมาชิก</h2></div>
      <div style="overflow-y:auto;flex:1" id="memberList">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- PROFILE TAB -->
    <div class="tab-pane" id="tabProfile">
      <div class="top-bar"><h2>⚙️ โปรไฟล์</h2></div>
      <div class="profile-area" id="profileArea"></div>
    </div>

  </div>

  <!-- BOTTOM TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="tabChats" onclick="switchTab('tabChats',this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      แชท
    </button>
    <button class="tab-btn" data-tab="tabMembers" onclick="switchTab('tabMembers',this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      สมาชิก
    </button>
    <button class="tab-btn" data-tab="tabProfile" onclick="switchTab('tabProfile',this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      โปรไฟล์
    </button>
  </div>
</div>

<!-- CHAT ROOM -->
<div class="screen" id="chatRoomScreen">
  <div class="chat-room-bar" id="roomBar">
    <button class="top-bar-back" onclick="closeRoom()">‹</button>
    <div class="avatar-wrap"><div class="avatar" id="roomAvatar" style="width:38px;height:38px;font-size:18px"></div></div>
    <div class="info"><div class="name" id="roomName"></div><div class="status" id="roomStatus"></div></div>
    <div class="room-actions">
      <button class="room-act-btn" onclick="startCall()" title="โทร">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </button>
    </div>
  </div>
  <div class="messages-area" id="messagesArea"></div>
  <div class="input-area">
    <button class="inp-btn" onclick="pickImage()" title="รูปภาพ">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
    </button>
    <textarea id="msgInput" placeholder="พิมพ์ข้อความ..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <input type="file" id="imgPicker" accept="image/*" style="display:none" onchange="sendImage(this)"/>
</div>

<!-- CALL OVERLAY -->
<div id="callOverlay">
  <div style="display:flex;flex-direction:column;align-items:center">
    <div class="call-avatar" id="callAvatar"></div>
    <div class="call-name" id="callName"></div>
    <div class="call-status" id="callStatus">กำลังโทร...</div>
  </div>
  <div class="call-actions">
    <button class="call-btn mute" id="muteBtn" onclick="toggleMute()">
      <div class="icon">🎙️</div><span>ปิดไมค์</span>
    </button>
    <button class="call-btn end" onclick="endCall()">
      <div class="icon">📵</div><span>วางสาย</span>
    </button>
    <button class="call-btn speaker" id="speakerBtn" onclick="toggleSpeaker()">
      <div class="icon">🔊</div><span>ลำโพง</span>
    </button>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div id="imgViewer">
  <button class="close-viewer" onclick="closeViewer()">✕</button>
  <img id="viewerImg" src="" alt=""/>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyBAAuY8sHd9tjM1wZ-VUvHy_NnfnCJF_Vo",
  authDomain: "family-chat-5a23b.firebaseapp.com",
  databaseURL: "https://family-chat-5a23b-default-rtdb.asia-southeast1.firebaseapp.com",
  projectId: "family-chat-5a23b",
  storageBucket: "family-chat-5a23b.firebasestorage.app",
  messagingSenderId: "718629135119",
  appId: "1:718629135119:web:5aab207361272c0c46947a"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ===== AGORA CONFIG =====
const AGORA_APP_ID = "c7a780270bf745ff88ba20abd4d36bcb";
let agoraClient = null;
let localAudioTrack = null;
let isMuted = false;
let callTimer = null;
let callSeconds = 0;

// ===== MEMBERS DATA =====
const MEMBERS = {
  "ball@family.com":  { name:"บอล",  emoji:"👨", color:"#4A90D9" },
  "nok@family.com":   { name:"น้อก", emoji:"👩", color:"#E91E8C" },
  "yai@family.com":   { name:"ยาย",  emoji:"👵", color:"#9B59B6" },
  "max@family.com":   { name:"แม็กซ์",emoji:"👦", color:"#27AE60" },
  "ploy@family.com":  { name:"พลอย", emoji:"👧", color:"#E67E22" },
};
function getMember(email){ return MEMBERS[email] || {name:email,emoji:"👤",color:"#888"} }

// ===== STATE =====
let currentUser = null;
let currentRoomId = null;
let unsubMessages = null;
let unsubChatList = null;
let chatPartner = null;
let onlineUsers = {};

// ===== AUTH =====
auth.onAuthStateChanged(user => {
  if(user){
    currentUser = user;
    showMain();
    loadChatList();
    loadProfile();
    updatePresence(true);
  } else {
    showScreen('loginScreen');
  }
});

document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  err.textContent = '';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    err.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
  }
};

// ===== PRESENCE =====
function updatePresence(online){
  if(!currentUser) return;
  db.collection('presence').doc(currentUser.uid).set({
    email: currentUser.email,
    online, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}
window.addEventListener('beforeunload', () => updatePresence(false));

// ===== SCREENS =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showMain(){ showScreen('mainScreen'); loadMembers(); }

// ===== TABS =====
function switchTab(tabId, btn){
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
  if(tabId === 'tabMembers') loadMembers();
}

// ===== CHAT LIST =====
function getRoomId(a, b){
  return [a,b].sort().join('__').replace(/@/g,'_at_').replace(/\./g,'_dot_');
}

function loadChatList(){
  const list = document.getElementById('chatList');
  const others = Object.entries(MEMBERS).filter(([e]) => e !== currentUser.email);
  list.innerHTML = '';
  others.forEach(([email, m]) => {
    const roomId = getRoomId(currentUser.email, email);
    const div = document.createElement('div');
    div.className = 'chat-item';
    div.innerHTML = `
      <div class="avatar" style="background:${m.color}20;font-size:22px">${m.emoji}</div>
      <div class="chat-info">
        <div class="chat-name">${m.name}</div>
        <div class="chat-preview" id="preview_${roomId}">แตะเพื่อแชท</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time" id="time_${roomId}"></div>
        <div id="badge_${roomId}"></div>
      </div>`;
    div.onclick = () => openRoom(email);
    list.appendChild(div);
    listenLastMsg(roomId, email);
  });
}

function listenLastMsg(roomId, partnerEmail){
  db.collection('rooms').doc(roomId).collection('messages')
    .orderBy('createdAt','desc').limit(1)
    .onSnapshot(snap => {
      if(snap.empty) return;
      const d = snap.docs[0].data();
      const el = document.getElementById('preview_'+roomId);
      const te = document.getElementById('time_'+roomId);
      if(el) el.textContent = d.type==='image' ? '📷 รูปภาพ' : (d.text||'');
      if(te && d.createdAt) te.textContent = fmtTime(d.createdAt.toDate());
    });
}

// ===== OPEN ROOM =====
function openRoom(partnerEmail){
  chatPartner = partnerEmail;
  const m = getMember(partnerEmail);
  currentRoomId = getRoomId(currentUser.email, partnerEmail);

  document.getElementById('roomAvatar').textContent = m.emoji;
  document.getElementById('roomAvatar').style.background = m.color+'20';
  document.getElementById('roomName').textContent = m.name;
  document.getElementById('roomStatus').textContent = '';

  showScreen('chatRoomScreen');
  listenMessages();
  listenOnline(partnerEmail);
}

function closeRoom(){
  if(unsubMessages){ unsubMessages(); unsubMessages=null; }
  showScreen('mainScreen');
  chatPartner = null; currentRoomId = null;
}

function listenOnline(email){
  db.collection('presence').where('email','==',email).limit(1)
    .onSnapshot(snap => {
      if(snap.empty) return;
      const d = snap.docs[0].data();
      document.getElementById('roomStatus').textContent = d.online ? 'ออนไลน์' : 'ออฟไลน์';
    });
}

// ===== MESSAGES =====
function listenMessages(){
  const area = document.getElementById('messagesArea');
  area.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  if(unsubMessages) unsubMessages();
  unsubMessages = db.collection('rooms').doc(currentRoomId)
    .collection('messages').orderBy('createdAt','asc')
    .onSnapshot(snap => {
      area.innerHTML = '';
      let lastDate = '';
      snap.forEach(doc => {
        const d = doc.data();
        if(!d.createdAt) return;
        const date = d.createdAt.toDate().toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
        if(date !== lastDate){
          lastDate = date;
          area.insertAdjacentHTML('beforeend',`<div class="date-divider"><span>${date}</span></div>`);
        }
        renderMsg(area, d);
      });
      area.scrollTop = area.scrollHeight;
    });
}

function renderMsg(area, d){
  const me = d.senderEmail === currentUser.email;
  const m = getMember(d.senderEmail);
  const row = document.createElement('div');
  row.className = 'msg-row ' + (me ? 'me' : 'them');

  let bubbleContent = '';
  if(d.type === 'image'){
    bubbleContent = `<img src="${d.imageUrl}" onclick="openViewer('${d.imageUrl}')" loading="lazy"/>`;
  } else {
    bubbleContent = escapeHtml(d.text||'');
  }

  const time = d.createdAt ? fmtTime(d.createdAt.toDate()) : '';
  row.innerHTML = `
    ${!me ? `<div class="avatar-sm" style="background:${m.color}20">${m.emoji}</div>` : ''}
    <div style="display:flex;flex-direction:column;align-items:${me?'flex-end':'flex-start'};gap:2px;max-width:75%">
      ${!me ? `<div class="msg-sender">${m.name}</div>` : ''}
      <div class="bubble">${bubbleContent}</div>
    </div>
    <div class="msg-time">${time}</div>
    ${me ? '' : ''}`;
  area.appendChild(row);
}

async function sendMsg(){
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if(!text || !currentRoomId) return;
  inp.value = ''; inp.style.height='auto';
  try {
    await db.collection('rooms').doc(currentRoomId).collection('messages').add({
      text, senderEmail: currentUser.email,
      type:'text', createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e){ showToast('ส่งไม่ได้: '+e.message); }
}

function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
}
function autoResize(el){
  el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px';
}

// ===== IMAGE =====
function pickImage(){ document.getElementById('imgPicker').click(); }

async function sendImage(input){
  const file = input.files[0]; if(!file) return;
  showToast('กำลังอัพโหลด...');
  try {
    const ref = storage.ref(`chat/${currentRoomId}/${Date.now()}_${file.name}`);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    await db.collection('rooms').doc(currentRoomId).collection('messages').add({
      imageUrl: url, senderEmail: currentUser.email,
      type:'image', createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('ส่งรูปแล้ว ✓');
  } catch(e){ showToast('อัพโหลดไม่ได้: '+e.message); }
  input.value='';
}

function openViewer(src){ document.getElementById('viewerImg').src=src; document.getElementById('imgViewer').classList.add('active'); }
function closeViewer(){ document.getElementById('imgViewer').classList.remove('active'); }

// ===== MEMBERS TAB =====
function loadMembers(){
  const list = document.getElementById('memberList');
  list.innerHTML = '';
  Object.entries(MEMBERS).forEach(([email, m]) => {
    const isMe = email === currentUser?.email;
    const div = document.createElement('div');
    div.className = 'member-item';
    div.innerHTML = `
      <div class="avatar-wrap">
        <div class="avatar" style="background:${m.color}20;width:48px;height:48px;font-size:22px">${m.emoji}</div>
        <div class="online-dot" id="dot_${email.replace(/[@.]/g,'_')}" style="display:none"></div>
      </div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:600">${m.name} ${isMe?'<span style="font-size:12px;color:var(--gray)">(คุณ)</span>':''}</div>
        <div style="font-size:12px;color:var(--gray)" id="status_${email.replace(/[@.]/g,'_')}">ออฟไลน์</div>
      </div>
      ${!isMe ? `<button onclick="openRoom('${email}')" style="background:var(--green);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:13px;cursor:pointer">แชท</button>` : ''}`;
    list.appendChild(div);
    listenMemberPresence(email);
  });
}

function listenMemberPresence(email){
  const key = email.replace(/[@.]/g,'_');
  db.collection('presence').where('email','==',email).limit(1)
    .onSnapshot(snap => {
      const dot = document.getElementById('dot_'+key);
      const st  = document.getElementById('status_'+key);
      if(snap.empty){ return; }
      const d = snap.docs[0].data();
      if(dot) dot.style.display = d.online ? 'block' : 'none';
      if(st)  st.textContent = d.online ? 'ออนไลน์' : 'ออฟไลน์';
    });
}

// ===== PROFILE =====
function loadProfile(){
  const area = document.getElementById('profileArea');
  if(!currentUser) return;
  const m = getMember(currentUser.email);
  area.innerHTML = `
    <div class="profile-card">
      <div class="profile-avatar" style="background:${m.color}20;font-size:40px">${m.emoji}</div>
      <div class="profile-name">${m.name}</div>
      <div class="profile-email">${currentUser.email}</div>
    </div>
    <div class="setting-group">
      <div class="setting-item">
        <div class="setting-icon" style="background:#E3F2FD">🔔</div>
        <div class="setting-label">การแจ้งเตือน</div>
        <div class="setting-arrow">›</div>
      </div>
      <div class="setting-item">
        <div class="setting-icon" style="background:#F3E5F5">🔒</div>
        <div class="setting-label">ความเป็นส่วนตัว</div>
        <div class="setting-arrow">›</div>
      </div>
      <div class="setting-item" onclick="shareApp()">
        <div class="setting-icon" style="background:#E8F5E9">📤</div>

}

function shareApp(){
  const url = window.location.href;
  if(navigator.share){ navigator.share({title:'Family Chat',url}); }
  else { navigator.clipboard.writeText(url); showToast('คัดลอก URL แล้ว'); }
}

async function logout(){
  updatePresence(false);
  await auth.signOut();
  showScreen('loginScreen');
}

// ===== AGORA CALL =====
async function startCall(){
  if(!chatPartner) return;
  const m = getMember(chatPartner);
  document.getElementById('callAvatar').textContent = m.emoji;
  document.getElementById('callName').textContent = m.name;
  document.getElementById('callStatus').textContent = 'กำลังโทร...';
  document.getElementById('callOverlay').classList.add('active');

  const channel = currentRoomId;
  try {
    agoraClient = AgoraRTC.createClient({mode:'rtc',codec:'vp8'});
    await agoraClient.join(AGORA_APP_ID, channel, null, null);
    localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
    await agoraClient.publish([localAudioTrack]);

    agoraClient.on('user-published', async (user, mediaType) => {
      await agoraClient.subscribe(user, mediaType);
      if(mediaType === 'audio'){ user.audioTrack.play(); }
    });

    // notify via Firestore
    await db.collection('calls').doc(channel).set({
      caller: currentUser.email,
      callee: chatPartner,
      channel, status:'calling',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById('callStatus').textContent = 'รอสาย...';
    startCallTimer();
  } catch(e){
    showToast('โทรไม่ได้: '+e.message);
    document.getElementById('callOverlay').classList.remove('active');
    if(agoraClient) agoraClient.leave();
  }
}

function startCallTimer(){
  callSeconds = 0;
  callTimer = setInterval(() => {
    callSeconds++;
    const m = String(Math.floor(callSeconds/60)).padStart(2,'0');
    const s = String(callSeconds%60).padStart(2,'0');
    document.getElementById('callStatus').textContent = `${m}:${s}`;
  }, 1000);
}

async function endCall(){
  clearInterval(callTimer);
  if(localAudioTrack){ localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack=null; }
  if(agoraClient){ await agoraClient.leave(); agoraClient=null; }
  document.getElementById('callOverlay').classList.remove('active');
  if(currentRoomId){
    db.collection('calls').doc(currentRoomId).update({status:'ended'}).catch(()=>{});
  }
}

function toggleMute(){
  if(!localAudioTrack) return;
  isMuted = !isMuted;
  localAudioTrack.setEnabled(!isMuted);
  const btn = document.getElementById('muteBtn');
  btn.querySelector('.icon').textContent = isMuted ? '🔇' : '🎙️';
  btn.querySelector('span').textContent = isMuted ? 'เปิดไมค์' : 'ปิดไมค์';
  if(isMuted) btn.querySelector('.icon').style.background='rgba(255,59,48,.7)';
  else btn.querySelector('.icon').style.background='rgba(255,255,255,.2)';
}

function toggleSpeaker(){
  showToast('ลำโพง: ฟีเจอร์นี้ขึ้นกับอุปกรณ์');
}

// incoming call listener
function listenIncomingCalls(){
  if(!currentUser) return;
  db.collection('calls').where('callee','==',currentUser.email).where('status','==','calling')
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if(change.type==='added'){
          const d = change.doc.data();
          const caller = getMember(d.caller);
          if(confirm(`📞 ${caller.name} กำลังโทรหาคุณ\nรับสายไหม?`)){
            answerCall(d);
          } else {
            change.doc.ref.update({status:'declined'});
          }
        }
      });
    });
}

async function answerCall(d){
  const m = getMember(d.caller);
  document.getElementById('callAvatar').textContent = m.emoji;
  document.getElementById('callName').textContent = m.name;
  document.getElementById('callStatus').textContent = 'เชื่อมต่อ...';
  document.getElementById('callOverlay').classList.add('active');
  currentRoomId = d.channel;

  try {
    agoraClient = AgoraRTC.createClient({mode:'rtc',codec:'vp8'});
    await agoraClient.join(AGORA_APP_ID, d.channel, null, null);
    localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
    await agoraClient.publish([localAudioTrack]);
    agoraClient.on('user-published', async (user, mediaType) => {
      await agoraClient.subscribe(user, mediaType);
      if(mediaType==='audio') user.audioTrack.play();
    });
    await d.ref?.update({status:'active'});
    startCallTimer();
  } catch(e){
    showToast('รับสายไม่ได้: '+e.message);
    document.getElementById('callOverlay').classList.remove('active');
  }
}

// ===== UTILS =====
function fmtTime(date){
  return date.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
}
function escapeHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Start incoming call listener after auth
auth.onAuthStateChanged(u => { if(u) listenIncomingCalls(); });
</script>
